<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White background -->
  <rect width="100" height="100" fill="#fff"/>
  <!-- Black border -->
  <rect x="2" y="2" width="96" height="96" fill="none" stroke="#000" stroke-width="8"/>
  <!-- Left vertical bar -->
  <rect x="14" y="14" width="16" height="72" fill="#000"/>
  <!-- Right vertical bar -->
  <rect x="70" y="14" width="16" height="72" fill="#000"/>
  <!-- Diagonal stripe top-left to bottom-right -->
  <polygon points="30,14 54,14 70,86 46,86" fill="#000"/>
</svg>
